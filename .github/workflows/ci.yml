name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prettier check
        run: npx prettier --check .

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --ci

  verify-new-arch:
    name: Verify New Architecture flags
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Android — newArchEnabled=true
        run: grep -E '^newArchEnabled=true' android/gradle.properties

      - name: iOS — New Arch via prepare_react_native_project!
        run: grep 'prepare_react_native_project!' ios/Podfile

  smoke-build-android:
    name: Android smoke build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK (retry)
        run: |
          set -euo pipefail
          sdk_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          for attempt in 1 2 3; do
            if sdkmanager --install "ndk;27.1.12297006"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "NDK install failed on attempt ${attempt}; retrying..."
            rm -rf \
              "$sdk_root/ndk/27.1.12297006" \
              "$sdk_root/temp" \
              "$sdk_root/.temp" \
              "$HOME/.android/cache"
            sleep 5
          done

      - name: Build Android debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon \
            -PgoogleMapsApiKey=MAPS_API_KEY_NOT_SET
